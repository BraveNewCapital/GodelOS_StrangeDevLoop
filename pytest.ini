[pytest]
minversion = 7.0
addopts = -ra
log_cli = false
testpaths =
    tests/spec_aligned
norecursedirs =
    tests/_legacy_archive
    tests/backend
    tests/experiments
    tests/integration
    tests/semantic_search
    MVP
markers =
    spec_aligned: mark tests as part of the spec-aligned suite
filterwarnings =
    ignore::PendingDeprecationWarning:starlette.formparsers
    ignore::DeprecationWarning:PyPDF2
    ignore::DeprecationWarning:faiss.loader
    ignore::DeprecationWarning:setuptools._distutils.version
    ignore::UserWarning:pydantic._internal._fields
