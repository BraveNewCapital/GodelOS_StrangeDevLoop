[tool:pytest]
minversion = 7.0
addopts =
    -q
    --cov=MVP
    --cov=backend
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-branch
    --cov-fail-under=0
testpaths =
    MVP/experiments/protocol_theta/tests
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning

[coverage:run]
branch = True
source =
    MVP
    backend
omit =
    */__init__.py
    */tests/*
    */.venv/*
    */venv/*
    */mvp_venv/*
    */.venv_mvp/*

[coverage:report]
show_missing = True
skip_covered = False
precision = 2
