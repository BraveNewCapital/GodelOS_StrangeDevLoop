name: repo-architect

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operating mode. ''issue'' (default safe governance mode). ''analyze''/''report'' are read-only. ''mutate''/''campaign'' are charter-validated secondary modes (§9–§10).'
        required: true
        default: 'issue'
        type: choice
        options:
          - issue
          - analyze
          - report
          - mutate
          - campaign
      dry_run:
        description: 'Dry-run: write issue bodies to disk without calling the GitHub Issues API'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_issues:
        description: 'Issue mode: maximum issues to open/update per run'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '5'
      issue_subsystem:
        description: 'Issue mode: restrict gap detection to a subsystem (leave blank for all)'
        required: false
        default: ''
        type: string
      github_model:
        description: 'GitHub Models model id (overrides preferred model; leave blank to use catalog resolution)'
        required: false
        default: ''
        type: string
      github_fallback_model:
        description: 'GitHub Models fallback model id (used if primary model fails)'
        required: false
        default: ''
        type: string
      report_path:
        description: 'Primary report path (analyze/report modes)'
        required: false
        default: 'docs/repo_architect/runtime_inventory.md'
        type: string
      mutation_budget:
        description: 'Maximum automatic mutations per run (mutate mode, charter §11)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
      max_slices:
        description: 'Campaign max slices (campaign mode, charter §11)'
        required: false
        default: '3'
        type: string
      lanes:
        description: 'Comma-separated lane order (mutate/campaign modes, charter §10)'
        required: false
        default: 'parse_errors,import_cycles,entrypoint_consolidation,hygiene,report'
        type: string
  schedule:
    - cron: '17 * * * *'

concurrency:
  group: repo-architect-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write     # required for mutation modes (branch push); read-only for issue mode
  issues: write       # required for issue-first mode (open/update GitHub Issues)
  pull-requests: write  # required for mutation modes (PR creation)
  models: read

jobs:
  repo-architect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure artifact directories exist
        run: |
          mkdir -p .agent docs/repo_architect docs/repo_architect/issues

      - name: Resolve GitHub Models configuration
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MODEL: ${{ github.event.inputs.github_model }}
          GITHUB_FALLBACK_MODEL: ${{ github.event.inputs.github_fallback_model }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          env_github_model = os.environ.get("GITHUB_MODEL", "").strip()
          env_github_fallback_model = os.environ.get("GITHUB_FALLBACK_MODEL", "").strip()
          order = [
              "openai/gpt-5",
              "openai/o3",
          ]
          available = set()
          catalog_ok = False
          try:
              req = urllib.request.Request(
                  "https://models.github.ai/catalog/models",
                  headers={
                      "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                      "Accept": "application/json",
                      "User-Agent": "repo-architect-workflow",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
              models = payload.get("data", payload) if isinstance(payload, dict) else payload
              if isinstance(models, list):
                  catalog_ok = True
                  for item in models:
                      if isinstance(item, dict):
                          model_id = item.get("id") or item.get("name") or item.get("model")
                          if isinstance(model_id, str) and model_id:
                              available.add(model_id)
          except Exception as exc:
              print(f"warning: GitHub Models catalog lookup failed; using defaults ({exc})")

          def first_available(candidates):
              for candidate in candidates:
                  if candidate in available:
                      return candidate
              return None

          def deterministic_available(exclude=None):
              candidates = sorted(m for m in available if m != exclude)
              return candidates[0] if candidates else None

          if env_github_model:
              preferred = env_github_model
          elif catalog_ok and available:
              preferred = first_available(order) or deterministic_available() or order[0]
          else:
              preferred = order[0]

          if env_github_fallback_model:
              fallback = env_github_fallback_model
          elif catalog_ok and available:
              fallback = (
                  first_available([c for c in order if c != preferred])
                  or deterministic_available(exclude=preferred)
                  or preferred
              )
          else:
              fallback = order[1] if len(order) > 1 and order[1] != preferred else order[0]

          if not isinstance(preferred, str) or not preferred:
              preferred = order[0]
          if not isinstance(fallback, str) or not fallback:
              fallback = order[1] if len(order) > 1 and order[1] != preferred else order[0]

          env_file = os.environ.get("GITHUB_ENV")
          if not env_file:
              raise RuntimeError("GITHUB_ENV is not set; this internal workflow step must run inside GitHub Actions with environment-file support.")
          with open(env_file, "a", encoding="utf-8") as fh:
              fh.write(f"REPO_ARCHITECT_PREFERRED_MODEL={preferred}\n")
              fh.write(f"REPO_ARCHITECT_FALLBACK_MODEL={fallback}\n")
          print(f"selected preferred={preferred} fallback={fallback}")
          PY

      - name: Run repo architect
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BASE_BRANCH: ${{ github.event.repository.default_branch }}
          REPO_ARCHITECT_BRANCH_SUFFIX: ${{ github.run_id }}-${{ github.run_attempt }}
          GITHUB_MODEL: ${{ github.event.inputs.github_model }}
          GITHUB_FALLBACK_MODEL: ${{ github.event.inputs.github_fallback_model }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          MAX_ISSUES="${{ github.event.inputs.max_issues }}"
          ISSUE_SUBSYSTEM="${{ github.event.inputs.issue_subsystem }}"
          MODEL="${{ github.event.inputs.github_model }}"
          REPORT_PATH="${{ github.event.inputs.report_path }}"
          MUTATION_BUDGET="${{ github.event.inputs.mutation_budget }}"
          MAX_SLICES="${{ github.event.inputs.max_slices }}"
          LANES="${{ github.event.inputs.lanes }}"

          # Defaults for scheduled runs (primary issue-first mode)
          if [ -z "$MODE" ]; then MODE="issue"; fi
          if [ -z "$DRY_RUN" ]; then DRY_RUN="false"; fi
          if [ -z "$MAX_ISSUES" ]; then MAX_ISSUES="1"; fi
          if [ -z "$REPORT_PATH" ]; then REPORT_PATH="docs/repo_architect/runtime_inventory.md"; fi
          if [ -z "$MUTATION_BUDGET" ]; then MUTATION_BUDGET="1"; fi
          if [ -z "$MAX_SLICES" ]; then MAX_SLICES="3"; fi
          if [ -z "$LANES" ]; then LANES="parse_errors,import_cycles,entrypoint_consolidation,hygiene,report"; fi

          EXTRA_ARGS=""

          # Issue-first mode arguments
          if [ "$MODE" = "issue" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --max-issues $MAX_ISSUES"
            if [ "$DRY_RUN" = "true" ]; then
              EXTRA_ARGS="$EXTRA_ARGS --dry-run"
            fi
            if [ -n "$ISSUE_SUBSYSTEM" ]; then
              EXTRA_ARGS="$EXTRA_ARGS --issue-subsystem $ISSUE_SUBSYSTEM"
            fi
          fi

          # Charter-validated mutation mode arguments (§9–§10 GODELOS_REPO_IMPLEMENTATION_CHARTER)
          if [ "$MODE" = "campaign" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --max-slices $MAX_SLICES --lanes $LANES"
          elif [ "$MODE" = "mutate" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --lanes $LANES"
          fi

          if [ -n "$MODEL" ]; then EXTRA_ARGS="$EXTRA_ARGS --github-model $MODEL"; fi

          python repo_architect.py --allow-dirty --mode "$MODE" --report-path "$REPORT_PATH" --mutation-budget "$MUTATION_BUDGET" $EXTRA_ARGS

      - name: Upload repo architect artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-architect-${{ github.run_id }}
          path: |
            .agent
            docs/repo_architect
          if-no-files-found: warn
          retention-days: 7

      - name: Write workflow summary
        if: always()
        run: |
          echo "## repo-architect run summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **mode**: \`${{ github.event.inputs.mode || 'issue' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **dry-run**: \`${{ github.event.inputs.dry_run || 'false' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          if [ -f ".agent/latest_analysis.json" ]; then
            SCORE=$(python -c "import json; d=json.load(open('.agent/latest_analysis.json')); print(d.get('architecture_score','?'))")
            echo "- **architecture score**: $SCORE/100" >> $GITHUB_STEP_SUMMARY
          fi
